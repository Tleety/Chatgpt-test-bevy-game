<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Bevy 2D Game</title>
    <link data-trunk rel="rust" data-wasm-opt="z"/>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
        }
        canvas {
            border: 1px solid #444;
            background: #000;
            max-width: 100%;
            max-height: 80vh;
        }
        #controls {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div id="controls">
        <p><strong>Controls:</strong> Use WASD or Arrow Keys to move the blue square!</p>
    </div>
</body>
</html>
