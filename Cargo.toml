[package]
name = "bevy-game"
version = "0.1.0"
edition = "2021"
description = "A 2D Bevy game example"
authors = ["Your Name <your.email@example.com>"]

[dependencies]
bevy = { version = "0.14", default-features = false, features = [
    "bevy_asset",
    "bevy_render",
    "bevy_core_pipeline",
    "bevy_sprite",
    "bevy_text",
    "bevy_ui",
    "bevy_winit",
    "png",
    "x11",
] }

# Fast compiles for development
[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

# Better runtime performance for release builds
[profile.release]
lto = true
codegen-units = 1
