# Enable getrandom WASM support with proper configuration for getrandom 0.3
[build]
rustflags = ["--cfg", "web_sys_unstable_apis"]

[target.wasm32-unknown-unknown]
rustflags = ["--cfg", "web_sys_unstable_apis", "--cfg", "getrandom_wasm_js"]

[env]
# Enable getrandom WASM support
CARGO_CFG_GETRANDOM_WASM_JS = "1"