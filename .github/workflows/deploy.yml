name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
        
    - name: Install wasm-bindgen-cli
      run: cargo install wasm-bindgen-cli

    - name: Build for Web
      env:
        RUSTFLAGS: "--cfg=wasm_js --cfg=web_sys_unstable_apis"
      run: cargo build --release --target wasm32-unknown-unknown

    - name: Generate WASM bindings
      run: |
        wasm-bindgen --out-dir web/ --target web target/wasm32-unknown-unknown/release/bevy-game.wasm

    - name: Create web directory and copy assets  
      run: |
        mkdir -p web/assets
        cp -r assets/* web/assets/ || true
        
    - name: Create index.html
      run: |
        cat > web/index.html << 'EOF'
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="utf-8">
            <title>Bevy 2D Game</title>
            <style>
                body {
                    margin: 0;
                    padding: 0;
                    background: #222;
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    align-items: center;
                    min-height: 100vh;
                    font-family: Arial, sans-serif;
                    color: white;
                }
                canvas {
                    border: 1px solid #444;
                    background: #000;
                    max-width: 100%;
                    max-height: 80vh;
                }
                #loading {
                    text-align: center;
                    margin-bottom: 20px;
                }
                #error {
                    color: #ff6b6b;
                    text-align: center;
                    display: none;
                }
                #controls {
                    margin-top: 20px;
                    text-align: center;
                    font-size: 14px;
                    color: #ccc;
                }
            </style>
        </head>
        <body>
            <div id="loading">
                <h2>Loading Bevy 2D Game...</h2>
                <p>Please wait while the game loads.</p>
            </div>
            <div id="error">
                <h2>Failed to load game</h2>
                <p>Make sure WebAssembly is supported in your browser.</p>
            </div>
            <canvas id="bevy"></canvas>
            <div id="controls">
                <p><strong>Controls:</strong> Use WASD or Arrow Keys to move the blue square! Press ESC to exit.</p>
            </div>
            <script type="module">
                import init from './bevy-game.js';
                
                async function run() {
                    try {
                        await init();
                        document.getElementById('loading').style.display = 'none';
                    } catch (error) {
                        console.error('Failed to load WASM:', error);
                        document.getElementById('loading').style.display = 'none';
                        document.getElementById('error').style.display = 'block';
                    }
                }
                
                run();
            </script>
        </body>
        </html>
        EOF

    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4